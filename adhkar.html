<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>أذكاري - راديو قرآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --secondary: #2196F3;
            --bg: linear-gradient(135deg, #111 0%, #222 100%);
            --card-bg: #222;
            --text: #fff;
            --gold: #FFD700;
            --nav-bg: rgba(17, 17, 17, 0.95);
            --border-color: #444;
        }

        body.light-mode {
            --bg: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            --card-bg: #fff;
            --text: #333;
            --nav-bg: rgba(255,255,255,0.95);
            --border-color: #ddd;
            --primary: #43A047;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* الصفحات */
        .page {
            display: none;
            flex-direction: column;
            height: 100vh;
            animation: fadeIn 0.3s ease;
        }
        .active-page { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* الهيدر */
        .header {
            padding: 15px 20px;
            text-align: center;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
        }
        .header h2, .header h3 { margin: 0; color: var(--primary); font-family: 'Amiri'; }
        .header i { font-size: 1.3rem; cursor: pointer; color: var(--text); padding: 8px; border-radius: 50%; transition: 0.2s; }
        .header i:hover { background: rgba(76, 175, 80, 0.2); color: var(--primary); }

        /* شبكة الأقسام */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            padding-bottom: 100px;
        }

        .cat-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            border: 1px solid rgba(76, 175, 80, 0.3);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .cat-card:active { transform: scale(0.95); }
        .cat-card i { font-size: 2.2rem; color: var(--primary); margin-bottom: 12px; display: block; }
        .cat-card span { font-weight: bold; font-size: 0.95rem; color: var(--text); }
        body.light-mode .cat-card { border-color: rgba(67, 160, 71, 0.3); }

        /* صفحة الذكر */
        .dhikr-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .main-dhikr-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            min-height: 320px;
            max-height: 420px;
            border-radius: 30px;
            padding: 20px;
            border: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 10px 40px rgba(76, 175, 80, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            touch-action: pan-y;
            user-select: none;
        }

        .dhikr-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .dhikr-title { color: var(--gold); font-weight: bold; font-family: 'Cairo'; font-size: 0.9em; }
        .dhikr-progress { color: var(--primary); font-size: 1.1rem; font-weight: bold; }

        #dhikrText {
            font-family: 'Amiri', serif;
            line-height: 1.9;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 10px 0;
            font-size: 20px;
        }

        #dhikrDesc {
            color: var(--primary);
            font-size: 0.75rem;
            min-height: 16px;
            font-weight: bold;
            margin-top: 5px;
            flex-shrink: 0;
        }

        #dhikrRef {
            color: var(--secondary);
            font-size: 0.7rem;
            min-height: 14px;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .font-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            flex-shrink: 0;
        }

        .f-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Cairo';
            transition: 0.2s;
        }
        .f-btn:hover { background: var(--primary-dark); transform: scale(1.05); }

        /* شريط التقدم */
        .progress-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 12px;
            border-radius: 6px;
            margin-top: 15px;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
        }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; border-radius: 6px; }
        .progress-bar.completed { background: var(--secondary); }

        .progress-text {
            margin-top: 8px;
            font-size: 0.85rem;
            opacity: 0.8;
            font-weight: bold;
        }

        /* السبحة */
        .sebha-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-bottom: 100px;
        }

        .sebha-btn {
            width: 200px;
            height: 200px;
            border: 8px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.4);
            background: rgba(76, 175, 80, 0.1);
            transition: 0.1s;
            user-select: none;
        }
        .sebha-btn:active { transform: scale(0.95); }
        body.light-mode .sebha-btn { box-shadow: 0 0 30px rgba(67, 160, 71, 0.3); }

        .sebha-controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px 25px;
            border-radius: 25px;
        }
        body.light-mode .sebha-controls { background: rgba(0,0,0,0.05); }

        .sebha-input {
            width: 70px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            text-align: center;
            font-family: 'Cairo';
            font-size: 1.2em;
            font-weight: bold;
            background: var(--card-bg);
            color: var(--text);
        }

        .sebha-label { color: var(--text); opacity: 0.8; }

        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--primary);
            z-index: 100;
        }

        .nav-link {
            color: var(--text);
            text-align: center;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
            padding: 5px 15px;
        }
        .nav-link:hover { opacity: 0.8; }
        .nav-link.active { opacity: 1; color: var(--primary); }
        .nav-link i { font-size: 1.5rem; display: block; margin-bottom: 3px; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-family: 'Cairo';
            border: 1px solid var(--primary);
        }
        .toast.show { opacity: 1; }
        body.light-mode .toast { background: rgba(0,0,0,0.9); }

        /* صفحة الإعدادات */
        .settings-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .setting-item {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .setting-label { font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .setting-label i { color: var(--primary); font-size: 1.2rem; }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: #444;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle-switch.active { background: var(--primary); }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .toggle-switch.active::after { left: 26px; }

        /* متجاوب */
        @media (max-width: 400px) {
            .grid-container { padding: 15px; gap: 10px; }
            .cat-card { padding: 20px 8px; }
            .cat-card i { font-size: 1.8rem; }
            .cat-card span { font-size: 0.85rem; }
            .sebha-btn { width: 160px; height: 160px; font-size: 3rem; }
            .main-dhikr-card { min-height: 300px; padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- صفحة الرئيسية -->
    <div id="homePage" class="page active-page">
        <div class="header">
            <i class="fas fa-language" onclick="changeLang()" title="تغيير اللغة"></i>
            <h2 data-ar="أذكاري" data-en="My Azkar">أذكاري</h2>
            <i class="fas fa-cog" onclick="show('settingsPage')" title="الإعدادات"></i>
        </div>
        <div class="grid-container" id="mainMenu"></div>
    </div>

    <!-- صفحة الذكر -->
    <div id="dhikrPage" class="page">
        <div class="header">
            <i class="fas fa-chevron-right" onclick="goToHome()"></i>
            <h3 id="catTitle"></h3>
            <span id="dhikrCounter" style="color: var(--primary); font-size: 0.9rem;"></span>
        </div>
        <div class="dhikr-area">
            <div class="font-controls">
                <button class="f-btn" onclick="resize(2)"><i class="fas fa-plus"></i> خط</button>
                <button class="f-btn" onclick="resize(-2)"><i class="fas fa-minus"></i> خط</button>
            </div>
            <div class="main-dhikr-card" id="dhikrCard">
                <div class="dhikr-title-bar">
                    <div class="dhikr-title" id="dhikrTitle"></div>
                    <div class="dhikr-progress" id="dhikrProgress"></div>
                </div>
                <div id="dhikrText"></div>
                <div id="dhikrDesc"></div>
                <div id="dhikrRef"></div>
                <div class="progress-container" onclick="doCount()">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="targetLabel"></div>
            </div>
        </div>
    </div>

    <!-- صفحة السبحة -->
    <div id="sebhaPage" class="page">
        <div class="header">
            <span></span>
            <h3 data-ar="السبحة الإلكترونية" data-en="Electronic Tasbih">السبحة الإلكترونية</h3>
            <span></span>
        </div>
        <div class="sebha-container">
            <div class="sebha-btn" onclick="sebhaClick()" id="sebhaCircle">0</div>
            <div class="sebha-controls">
                <span class="sebha-label" data-ar="الهدف:" data-en="Goal:">الهدف:</span>
                <input type="number" class="sebha-input" id="sebhaTarget" value="33" onchange="saveSebhaSettings()">
                <button class="f-btn" onclick="resetSebha()">
                    <i class="fas fa-redo"></i> <span data-ar="تصفير" data-en="Reset">تصفير</span>
                </button>
            </div>
            <p style="margin-top: 20px; opacity: 0.7; font-family: 'Cairo';" data-ar="اضغط على الدائرة للعد" data-en="Tap circle to count">اضغط على الدائرة للعد</p>
        </div>
    </div>

    <!-- صفحة الإعدادات -->
    <div id="settingsPage" class="page">
        <div class="header">
            <i class="fas fa-chevron-right" onclick="goToHome()"></i>
            <h3 data-ar="الإعدادات" data-en="Settings">الإعدادات</h3>
            <span></span>
        </div>
        <div class="settings-container">
            <div class="setting-item">
                <div class="setting-label">
                    <i class="fas fa-palette"></i>
                    <span data-ar="الوضع الليلي" data-en="Dark Mode">الوضع الليلي</span>
                </div>
                <div class="toggle-switch" id="themeToggle" onclick="toggleTheme()"></div>
            </div>
            <div class="setting-item">
                <div class="setting-label">
                    <i class="fas fa-volume-up"></i>
                    <span data-ar="صوت السبحة" data-en="Tasbih Sound">صوت السبحة</span>
                </div>
                <div class="toggle-switch" id="soundToggle" onclick="toggleSound()"></div>
            </div>
            <div class="setting-item">
                <div class="setting-label">
                    <i class="fas fa-mobile-vibration"></i>
                    <span data-ar="الاهتزاز" data-en="Vibration">الاهتزاز</span>
                </div>
                <div class="toggle-switch active" id="vibrateToggle" onclick="toggleVibrate()"></div>
            </div>
            <div class="setting-item" onclick="resetAllData()">
                <div class="setting-label" style="color: #f44336;">
                    <i class="fas fa-trash" style="color: #f44336;"></i>
                    <span data-ar="مسح جميع البيانات" data-en="Clear All Data">مسح جميع البيانات</span>
                </div>
                <i class="fas fa-chevron-left" style="color: #f44336;"></i>
            </div>
        </div>
    </div>

    <!-- شريط التنقل السفلي -->
    <nav class="bottom-nav">
        <div class="nav-link active" id="homeTab" onclick="show('homePage', this)">
            <i class="fas fa-th-large"></i>
            <span data-ar="الأذكار" data-en="Azkar">الأذكار</span>
        </div>
        <div class="nav-link" id="sebhaTab" onclick="show('sebhaPage', this)">
            <i class="fas fa-circle"></i>
            <span data-ar="السبحة" data-en="Tasbih">السبحة</span>

        <div class="nav-link" onclick="show('settingsPage', this)">
            <i class="fas fa-cog"></i>
            <span data-ar="الإعدادات" data-en="Settings">الإعدادات</span>
        </div>
    </nav>

        // === الصوت ===
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playClickSound() {
            if (!soundEnabled || !audioContext) return;
            if (audioContext.state === 'suspended') audioContext.resume();

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.type = 'sine';
            oscillator.frequency.value = 800;
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.05);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.05);
        }

        function vibrate(duration = 150) {
            if (vibrateEnabled && navigator.vibrate) {
                navigator.vibrate(duration);
            }
        }

            const t = document.getElementById('toast');

            t.classList.add('show');

                "أذكار المساء": "fa-moon",
                "أذكار النوم": "fa-bed",
                "أذكار الاستيقاظ": "fa-clock",
                "دخول الخلاء": "fa-door-open",
                "أذكار الوضوء": "fa-droplet",
                "الخروج": "fa-home",
                "أذكار المسجد": "fa-mosque",
                "أذكار الآذان": "fa-bell",
                "أذكار الصلاة": "fa-hands-praying",
                "الركوع": "fa-person-praying",
                "السجود": "fa-person",
                "التشهد": "fa-book-open",
                "أذكار بعد الصلاة": "fa-hands",
                "أذكار الاستخارة": "fa-question-circle",
                "أذكار الطعام": "fa-utensils",
                "السلام": "fa-handshake",
                "أذكار السفر": "fa-plane",
                "أذكار الضيف": "fa-user-group",
                "أذكار المرض": "fa-stethoscope",
                "الموت": "fa-heart-crack",
                "أذكار الرقية": "fa-shield",
                "أذكار الاستغفار": "fa-heart",
                "أذكار التسبيح": "fa-star"
            };
            menu.innerHTML = "";
            const categories = getCategories();
            categories.forEach(cat => {
                menu.innerHTML += `<div class="cat-card" onclick="openCat('${cat}')"><i class="fas ${icons[cat] || 'fa-star'}"></i><span>${cat}</span></div>`;
            });
        }

        // === فتح قسم ===
        function openCat(name) {
            currCat = name;
            currIdx = 0;
            currCount = 0;
            document.getElementById('catTitle').innerText = name;
            show('dhikrPage');
            renderDhikr();
        }

        // === الحصول على أذكار الفئة ===
        function getCategoryData(cat) {
            return ADHKAR_DATA.filter(d => d.category === cat);
        }

        // === عرض الذكر ===
        function renderDhikr() {
            const list = getCategoryData(currCat);
            if (!list || list.length === 0) return;
            
            const item = list[currIdx];
            document.getElementById('dhikrText').innerText = item.text;
            document.getElementById('dhikrTitle').innerText = item.reference || "";
            document.getElementById('dhikrDesc').innerText = item.description || "";
            document.getElementById('dhikrRef').innerText = "";
            document.getElementById('dhikrText').style.fontSize = fSize + "px";
            
            const progress = (currCount / item.count) * 100;
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = progress + "%";
            
            if (currCount >= item.count) {
                progressBar.classList.add('completed');
            } else {
                progressBar.classList.remove('completed');
            }
            
            document.getElementById('dhikrProgress').innerText = `${currCount}/${item.count}`;
            document.getElementById('dhikrCounter').innerText = `${currIdx + 1}/${list.length}`;
            document.getElementById('targetLabel').innerText = `الهدف: ${item.count}`;
        }

        // === العد ===
        function doCount() {
            initAudio();
            playClickSound();

            const list = getCategoryData(currCat);
            if (!list || list.length === 0) return;
            
            const limit = list[currIdx].count;
            if (currCount < limit) {
                currCount++;
                renderDhikr();
                
                if (currCount >= limit) {
                    // الاهتزاز عند اكتمال الهدف فقط
                    vibrate(200);
                    
                    // الانتقال التلقائي للذكر التالي بعد فترة قصيرة
                    setTimeout(() => {
                        if (currIdx < list.length - 1) {
                            currIdx++;
                            currCount = 0;
                            renderDhikr();
                        } else {
                            showToast('🎉 أتممت الأذكار!');
                        }
                    }, 800);
                }
            }
        }

        // === الذكر السابق ===
        function prevDhikr() {
            const list = getCategoryData(currCat);
            if (currIdx > 0) {
                currIdx--;
                currCount = 0;
                renderDhikr();
            }
        }

        // === الذكر التالي ===
        function nextDhikr() {
            const list = getCategoryData(currCat);
            if (currIdx < list.length - 1) {
                currIdx++;
                currCount = 0;
                renderDhikr();
            }
        }

        // === السحب للتنقل ===
        function initSwipe() {
            const card = document.getElementById('dhikrCard');
            
            card.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            card.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
        }

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // سحب لليسار = التالي (في RTL)
                    nextDhikr();
                } else {
                    // سحب لليمين = السابق (في RTL)
                    prevDhikr();
                }
            }
        }

        // === السبحة ===
        function sebhaClick() {
            initAudio();
            playClickSound();
            sVal++;
            document.getElementById('sebhaCircle').innerText = sVal;
            
            // الاهتزاز عند الوصول للهدف فقط
            if (sVal === sTarget || sVal % sTarget === 0) {
                vibrate(200);
            }
        }

        function resetSebha() {
            sVal = 0;
            document.getElementById('sebhaCircle').innerText = "0";
        }

        function saveSebhaSettings() {
            sTarget = parseInt(document.getElementById('sebhaTarget').value) || 33;
        }

        // === تغيير حجم الخط ===
        function resize(delta) {
            fSize = Math.max(14, Math.min(32, fSize + delta));
            document.getElementById('dhikrText').style.fontSize = fSize + "px";
        }

        // === التنقل بين الصفحات ===
        function show(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        function goToHome() {
            show('homePage', document.getElementById('homeTab'));
        }

        // === تغيير اللغة ===
        function changeLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });
        }

        // === الإعدادات ===
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeToggle').classList.toggle('active');
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').classList.toggle('active');
        }

        function toggleVibrate() {
            vibrateEnabled = !vibrateEnabled;
            document.getElementById('vibrateToggle').classList.toggle('active');
        }

        function resetAllData() {
            if (confirm('هل تريد مسح جميع البيانات؟')) {
                localStorage.clear();
                location.reload();
            }
        }

        // === البداية ===
        document.addEventListener('DOMContentLoaded', () => {
            initMenu();
            initSwipe();
            
            // تحميل الإعدادات
            if (localStorage.getItem('darkMode') === 'false') {
                document.body.classList.remove('light-mode');
                document.getElementById('themeToggle').classList.remove('active');
            }
            if (localStorage.getItem('soundEnabled') === 'true') {
                soundEnabled = true;
                document.getElementById('soundToggle').classList.add('active');
            }
            if (localStorage.getItem('vibrateEnabled') === 'false') {
                vibrateEnabled = false;
                document.getElementById('vibrateToggle').classList.remove('active');
            }
        });

        // حفظ الإعدادات
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('darkMode', !document.body.classList.contains('light-mode'));
            localStorage.setItem('soundEnabled', soundEnabled);
            localStorage.setItem('vibrateEnabled', vibrateEnabled);
        });
    </script>
</body>
</html>
