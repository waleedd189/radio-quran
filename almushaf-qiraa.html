<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="المصحف الإلكتروني - قراءة، استماع، تفسير">
    <meta name="theme-color" content="#4CAF50">
    <title>المصحف الإلكتروني - راديو قرآن</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #2E7D32;
            --secondary: #FF9800;
            --bg-gradient: linear-gradient(135deg, #111 0%, #222 100%);
            --card-bg: #222;
            --text: #fff;
            --gold: #FFD700;
            --border-color: #444;
            --ayah-font-size: 1.6em;
            --transition: all 0.3s ease;
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            --card-bg: #fff;
            --text: #333;
            --border-color: #ddd;
            --primary: #2E7D32;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            transition: var(--transition);
        }

        .main-content {
            padding: 220px 10px 90px 10px;
        }

        .top-bar {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%;
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            padding: 8px 5px;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
            border-bottom: 1px solid #333;
            min-height: 45px;
        }

        .btn-fab {
            background: #333; 
            color: white; 
            border: none;
            padding: 5px 8px; 
            border-radius: 18px;
            cursor: pointer; 
            font-family: 'Cairo'; 
            font-size: 0.8em;
            display: flex; 
            align-items: center; 
            gap: 3px; 
            transition: var(--transition);
            border: 1px solid #555;
        }

        .info-bar {
            position: fixed; 
            top: 45px; 
            left: 0; 
            width: 100%;
            background: rgba(17, 17, 17, 0.98);
            padding: 5px;
            z-index: 950;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .info-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            background: rgba(76, 175, 80, 0.15);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
        }

        .controls {
            position: fixed; 
            top: 90px; 
            left: 0; 
            width: 100%;
            background: rgba(17, 17, 17, 0.98);
            padding: 10px;
            z-index: 900;
            border-bottom: 1px solid #444;
            box-sizing: border-box;
        }

        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .mode-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 5px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Cairo';
            font-size: 0.9em;
            font-weight: bold;
            flex: 1;
            max-width: 120px;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
        }

        .selects-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .select-item {
            width: 100%;
        }

        select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            font-family: 'Cairo';
            font-size: 0.85em;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: left 8px center;
            padding-left: 30px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .go-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin-top: 5px;
        }

        .go-input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            font-family: 'Cairo';
            font-size: 0.85em;
            box-sizing: border-box;
        }

        .go-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            font-size: 0.85em;
        }

        .ayah-container {
            background: var(--card-bg);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ayah-number {
            display: inline-block;
            background: var(--primary);
            color: white;
            width: 32px; 
            height: 32px;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            font-weight: bold;
            margin-left: 8px;
            font-family: 'Amiri', serif;
            font-size: 0.9em;
        }

        .ayah-text {
            font-family: 'Amiri', serif;
            font-size: var(--ayah-font-size);
            line-height: 2;
            margin: 10px 0;
            text-align: justify;
            cursor: pointer;
        }

        .sujud-mark { color: #ff4d4d; font-size: 1.2em; font-weight: bold; }
        .waqf-mark { color: #FF9800; font-size: 1.1em; font-weight: bold; }

        .ayah-actions {
            display: flex; 
            justify-content: flex-end; 
            gap: 8px;
            border-top: 1px solid var(--border-color); 
            padding-top: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            background: transparent; 
            border: 2px solid #555; 
            color: #ccc;
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 16px;
        }

        .btn-play { border-color: var(--primary); color: var(--primary); }
        .btn-stop { border-color: #f44336; color: #f44336; }
        .btn-tafsir { border-color: #2196F3; color: #2196F3; }
        .btn-save { border-color: var(--secondary); color: var(--secondary); }
        .btn-saved { background: var(--secondary); color: white; border-color: var(--secondary); }

        .audio-player-fixed {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%;
            background: #222; 
            padding: 8px;
            z-index: 1000; 
            display: none; 
            flex-direction: column;
            gap: 5px;
            border-top: 1px solid #444;
        }

        .audio-player-fixed audio { 
            width: 100%;
            height: 40px;
        }

        .basmalah { 
            text-align: center; 
            font-family: 'Amiri', serif; 
            font-size: 1.8em; 
            color: var(--gold); 
            margin: 15px 0; 
            padding: 10px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
        }

        /* تنسيق فاصل نهاية الجزء */
        .juz-separator {
            text-align: center;
            padding: 10px;
            margin: 20px 0;
            background: linear-gradient(90deg, transparent, var(--secondary), transparent);
            color: #000;
            font-weight: bold;
            font-family: 'Cairo';
            border-radius: 15px;
            font-size: 0.9em;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(76, 175, 80, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9); 
            color: white; 
            padding: 10px 20px;
            border-radius: 25px; 
            z-index: 3000; 
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.9em;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        .section-header {
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
            font-size: 1em;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }

        .currently-playing {
            background: rgba(76, 175, 80, 0.15);
            border-right: 3px solid var(--primary);
        }

        @media (max-width: 480px) {
            .main-content { padding-top: 200px; }
            .top-bar { padding: 5px 3px; gap: 3px; }
            .btn-fab { padding: 4px 6px; font-size: 0.75em; }
            .info-panel { gap: 8px; padding: 4px 10px; font-size: 0.8em; }
            .controls { top: 85px; padding: 8px; }
            .mode-btn { padding: 4px 15px; font-size: 0.8em; }
            .ayah-text { font-size: calc(var(--ayah-font-size) * 0.85); }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="https://waleedd189.github.io/radio-quran/" class="btn-fab" style="background: var(--primary);">
        <i class="fas fa-home"></i> <span>الرئيسية</span>
    </a>
    <button class="btn-fab" onclick="changeLang()">
        <i class="fas fa-language"></i> <span id="langText">English</span>
    </button>
    <button class="btn-fab" onclick="toggleTheme()">
        <i class="fas fa-moon" id="themeIcon"></i> <span>الوضع</span>
    </button>
    <button class="btn-fab" onclick="changeFontSize(1)">
        <i class="fas fa-plus"></i> <span>تكبير</span>
    </button>
    <button class="btn-fab" onclick="changeFontSize(-1)">
        <i class="fas fa-minus"></i> <span>تصغير</span>
    </button>
    <button class="btn-fab" onclick="goToBookmark()" style="background: var(--secondary);">
        <i class="fas fa-bookmark"></i> <span>المحفوظ</span>
    </button>
</div>

<div class="info-bar">
    <div class="info-panel">
        <div class="info-item">
            <i class="fas fa-quran" style="color: var(--primary);"></i>
            <span id="currentSurahName">سورة الفاتحة</span>
        </div>
        <div class="info-item">
            <i class="fas fa-bookmark" style="color: var(--secondary);"></i>
            <span id="currentJuzInfo">الجزء 1</span>
        </div>
        <div class="info-item">
            <i class="fas fa-star" style="color: var(--gold);"></i>
            <span id="currentHizbInfo">الحزب 1</span>
        </div>
    </div>
</div>

<div class="controls">
    <div class="controls-container">
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('surah')" id="modeSurah">سورة</button>
            <button class="mode-btn" onclick="setMode('juz')" id="modeJuz">جزء</button>
        </div>
        
        <div class="selects-grid">
            <div class="select-item" id="surahWrapper">
                <select id="surahSelect" onchange="loadContent()">
                    <option value="" disabled selected>اختر السورة</option>
                </select>
            </div>
            
            <div class="select-item" id="juzWrapper" style="display:none;">
                <select id="juzSelect" onchange="loadContent()">
                    <option value="" disabled selected>اختر الجزء</option>
                </select>
            </div>
            
            <div class="select-item">
                <select id="reciterSelect" onchange="changeReciter()">
                    <optgroup label="المرتلون">
                        <option value="ar.alafasy" selected>مشاري العفاسي</option>
                        <option value="ar.abdulbasitmurattal">عبد الباسط</option>
                        <option value="ar.husary">الحصري</option>
                        <option value="ar.minshawi">المنشاوي</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="select-item">
                <select id="tafsirSelect" onchange="saveSettings()">
                    <option value="ar.muyassar" selected>تفسير الميسر</option>
                    <option value="ar.jalalayn">تفسير الجلالين</option>
                </select>
            </div>
        </div>

        <div class="go-row">
            <input type="number" id="goInput" class="go-input" placeholder="رقم الآية" min="1">
            <button class="go-btn" onclick="goToAyah()">اذهب</button>
        </div>
    </div>
</div>

<div class="main-content">
    <h1 style="text-align:center; font-family:'Amiri'; margin: 10px 0; font-size: 1.5em;">المصحف الشريف</h1>
    <div id="content">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <div>اختر سورة للبدء...</div>
        </div>
    </div>
</div>

<div class="audio-player-fixed" id="playerContainer">
    <div style="display: flex; gap: 8px; align-items: center; color: var(--primary); font-size: 0.9em;" id="currentAyahLabel">
        <i class="fas fa-play-circle"></i>
        <span>لم يتم التشغيل</span>
    </div>
    <audio id="mainAudio" controls preload="none" onended="onAudioEnded()"></audio>
</div>

<div class="modal" id="tafsirModal" onclick="if(event.target.id === 'tafsirModal') closeTafsir()" style="display:none;">
    <div class="modal-content">
        <h3 style="color: #2196F3; margin:0 0 10px 0;">تفسير الآية</h3>
        <div id="tafsirTextDisplay" class="tafsir-text">جاري التحميل...</div>
        <button class="close-modal" onclick="closeTafsir()">إغلاق</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const surahNames = [
        "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس",
        "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه",
        "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم",
        "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر",
        "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق",
        "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة",
        "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج",
        "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس",
        "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد",
        "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات",
        "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر",
        "المسد", "الإخلاص", "الفلق", "الناس"
    ];

    let currentMode = 'surah';
    let currentReciter = 'ar.alafasy';
    let currentSurah = 1;
    let currentJuz = 1;
    let currentFontSize = 1.6;
    let isPlaying = false;
    let isLoading = false;
    let scrollObserver;

    document.addEventListener('DOMContentLoaded', () => {
        loadSettings();
        initSelects();
        checkLastPosition();
        initScrollObserver();
    });

    function initSelects() {
        const surahSelect = document.getElementById('surahSelect');
        surahNames.forEach((name, i) => {
            const opt = document.createElement('option');
            opt.value = i + 1;
            opt.textContent = `${i + 1}. ${name}`;
            surahSelect.appendChild(opt);
        });

        const juzSelect = document.getElementById('juzSelect');
        for (let i = 1; i <= 30; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `الجزء ${i}`;
            juzSelect.appendChild(opt);
        }
    }

    function initScrollObserver() {
        scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const juz = entry.target.dataset.juz;
                    const hizb = entry.target.dataset.hizb;
                    if(juz) document.getElementById('currentJuzInfo').textContent = `الجزء ${juz}`;
                    if(hizb) document.getElementById('currentHizbInfo').textContent = `الحزب ${hizb}`;
                }
            });
        }, { threshold: 0.1 });
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('modeSurah').classList.toggle('active', mode === 'surah');
        document.getElementById('modeJuz').classList.toggle('active', mode === 'juz');
        document.getElementById('surahWrapper').style.display = mode === 'surah' ? 'block' : 'none';
        document.getElementById('juzWrapper').style.display = mode === 'juz' ? 'block' : 'none';
    }

    async function loadContent() {
        if (isLoading) return;
        let url, contentId;
        if (currentMode === 'surah') {
            contentId = document.getElementById('surahSelect').value;
            if (!contentId) return showToast('⚠️ اختر سورة');
            currentSurah = parseInt(contentId);
            url = `https://api.alquran.cloud/v1/surah/${contentId}/ar.uthmani`;
        } else {
            contentId = document.getElementById('juzSelect').value;
            if (!contentId) return showToast('⚠️ اختر جزء');
            currentJuz = parseInt(contentId);
            url = `https://api.alquran.cloud/v1/juz/${contentId}/ar.uthmani`;
        }
        
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div><div>جاري التحميل...</div></div>';
        isLoading = true;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.code === 200) renderContent(data.data.ayahs, contentId);
        } catch (error) {
            contentDiv.innerHTML = '<div class="loading-container" style="color:red;">حدث خطأ في الاتصال</div>';
        } finally {
            isLoading = false;
        }
    }

    function renderContent(ayahs, contentId) {
        let html = '';
        if (currentMode === 'surah') {
            document.getElementById('currentSurahName').textContent = surahNames[contentId - 1];
            html += `<div class="section-header">سورة ${surahNames[contentId - 1]}</div>`;
            if (contentId != 1 && contentId != 9) html += '<div class="basmalah">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>';
        } else {
            document.getElementById('currentSurahName').textContent = `الجزء ${contentId}`;
            html += `<div class="section-header">الجزء ${contentId}</div>`;
        }

        ayahs.forEach((ayah, index) => {
            const ayahNum = ayah.numberInSurah;
            const globalNum = ayah.number;
            const juz = ayah.juz;
            const hizb = ayah.hizbQuarter ? Math.ceil(ayah.hizbQuarter / 4) : Math.floor((globalNum - 1) / 250) + 1;
            
            let text = ayah.text;
            text = text.replace(/۝/g, '<span class="sujud-mark">۝</span>');
            text = text.replace(/[ۚۖۗۙۛۜ]/g, '<span class="waqf-mark">$&</span>');
            const audioUrl = `https://cdn.islamic.network/quran/audio/128/${currentReciter}/${globalNum}.mp3`;

            html += `
            <div class="ayah-container" id="ayah-${ayahNum}" data-juz="${juz}" data-hizb="${hizb}">
                <span class="ayah-number">${ayahNum}</span>
                <div class="ayah-text" onclick="playAyah('${audioUrl}', ${ayahNum})">${text}</div>
                <div class="ayah-actions">
                    <button class="btn-action btn-play" onclick="playAyah('${audioUrl}', ${ayahNum})"><i class="fas fa-play"></i></button>
                    <button class="btn-action btn-stop" onclick="stopAudio()"><i class="fas fa-stop"></i></button>
                    <button class="btn-action btn-tafsir" onclick="openTafsir(${globalNum})"><i class="fas fa-book-open"></i></button>
                </div>
            </div>`;

            // إضافة فاصل عند نهاية الجزء (إذا كانت الآية التالية تنتمي لجزء مختلف)
            if (index < ayahs.length - 1) {
                const nextAyah = ayahs[index + 1];
                if (nextAyah.juz !== ayah.juz) {
                    html += `<div class="juz-separator">🔚 نهاية الجزء ${ayah.juz} | 📖 بداية الجزء ${nextAyah.juz}</div>`;
                }
            }
        });

        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = html;
        
        // تفعيل المراقب لتحديث رقم الجزء تلقائياً عند السكرول
        document.querySelectorAll('.ayah-container').forEach(el => scrollObserver.observe(el));

        if (ayahs.length > 0) {
            document.getElementById('currentJuzInfo').textContent = `الجزء ${ayahs[0].juz}`;
        }
    }

    function playAyah(url, ayahNum) {
        stopAudio();
        const audio = document.getElementById('mainAudio');
        audio.src = url;
        audio.play().then(() => {
            isPlaying = true;
            document.getElementById('playerContainer').style.display = 'flex';
            document.getElementById('currentAyahLabel').innerHTML = `<i class="fas fa-play-circle"></i><span>${currentMode === 'surah' ? surahNames[currentSurah-1] : 'الجزء '+currentJuz} : ${ayahNum}</span>`;
            const el = document.getElementById(`ayah-${ayahNum}`);
            if (el) {
                document.querySelectorAll('.ayah-container').forEach(e => e.classList.remove('currently-playing'));
                el.classList.add('currently-playing');
            }
        }).catch(() => showToast('⚠️ تعذر التشغيل'));
    }

    function stopAudio() {
        const audio = document.getElementById('mainAudio');
        audio.pause();
        audio.currentTime = 0;
        isPlaying = false;
    }

    function onAudioEnded() {
        setTimeout(() => {
            if (!isPlaying) document.getElementById('playerContainer').style.display = 'none';
        }, 1000);
        document.querySelectorAll('.ayah-container').forEach(e => e.classList.remove('currently-playing'));
        isPlaying = false;
    }

    async function openTafsir(globalNum) {
        document.getElementById('tafsirModal').style.display = 'flex';
        document.getElementById('tafsirTextDisplay').innerText = 'جاري التحميل...';
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/ayah/${globalNum}/${document.getElementById('tafsirSelect').value}`);
            const data = await res.json();
            document.getElementById('tafsirTextDisplay').innerText = data.code === 200 ? data.data.text : 'لا يوجد تفسير';
        } catch {
            document.getElementById('tafsirTextDisplay').innerText = 'حدث خطأ في تحميل التفسير';
        }
    }

    function closeTafsir() { document.getElementById('tafsirModal').style.display = 'none'; }

    function goToAyah() {
        const num = parseInt(document.getElementById('goInput').value);
        if (!num) return showToast('⚠️ أدخل رقم الآية');
        const el = document.getElementById(`ayah-${num}`);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.style.boxShadow = "0 0 15px var(--primary)";
            setTimeout(() => el.style.boxShadow = "none", 3000);
        } else showToast('⚠️ الآية غير موجودة في هذا العرض');
    }

    function checkLastPosition() {
        const last = JSON.parse(localStorage.getItem('lastPosition'));
        if (last && Date.now() - last.timestamp < 86400000) {
            setTimeout(() => {
                if (confirm(`المتابعة من ${last.mode === 'surah' ? surahNames[last.id-1] : 'الجزء '+last.id} آية ${last.ayah}؟`)) {
                    setMode(last.mode);
                    if (last.mode === 'surah') document.getElementById('surahSelect').value = last.id;
                    else document.getElementById('juzSelect').value = last.id;
                    loadContent().then(() => setTimeout(() => {
                        const el = document.getElementById(`ayah-${last.ayah}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 800));
                }
            }, 1000);
        }
    }

    function goToBookmark() {
        const b = JSON.parse(localStorage.getItem('bookmark'));
        if (!b) return showToast('⚠️ لا يوجد محفوظ');
        setMode('surah');
        document.getElementById('surahSelect').value = b.surah;
        loadContent().then(() => setTimeout(() => {
            const el = document.getElementById(`ayah-${b.ayah}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 800));
    }

    function changeReciter() { currentReciter = document.getElementById('reciterSelect').value; saveSettings(); }

    function changeFontSize(d) {
        currentFontSize = Math.min(2.5, Math.max(1.0, currentFontSize + d * 0.1));
        document.documentElement.style.setProperty('--ayah-font-size', currentFontSize + 'em');
        saveSettings();
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        document.getElementById('themeIcon').className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
        saveSettings();
    }

    function changeLang() { /* Reserved for future use */ }

    function saveSettings() {
        localStorage.setItem('settings', JSON.stringify({
            fontSize: currentFontSize,
            theme: document.body.classList.contains('light-mode') ? 'light' : 'dark',
            reciter: currentReciter,
            tafsir: document.getElementById('tafsirSelect').value
        }));
    }

    function loadSettings() {
        const s = JSON.parse(localStorage.getItem('settings'));
        if (s) {
            if (s.fontSize) {
                currentFontSize = s.fontSize;
                document.documentElement.style.setProperty('--ayah-font-size', s.fontSize + 'em');
            }
            if (s.theme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
            if (s.reciter) {
                currentReciter = s.reciter;
                document.getElementById('reciterSelect').value = s.reciter;
            }
            if (s.tafsir) document.getElementById('tafsirSelect').value = s.tafsir;
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }
</script>

</body>
</html>
