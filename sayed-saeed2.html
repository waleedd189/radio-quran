  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cairo', 'Arial', sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px 15px;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 1300px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 25px;
      border: 1px solid rgba(255, 215, 0, 0.15);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
    }
    
    /* ===== رأس الصفحة ===== */
    .header {
      text-align: center;
      margin-bottom: 25px;
      position: relative;
    }
    
    h1 {
      font-family: 'Amiri', serif;
      font-size: 2.4rem;
      background: linear-gradient(135deg, #f5e7c8, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }
    
    .subtitle {
      color: #a0aec0;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .subtitle i {
      color: #d4af37;
    }
    
    .count-badge {
      background: #2d3748;
      padding: 5px 15px;
      border-radius: 50px;
      font-size: 0.9rem;
      border: 1px solid #d4af37;
      color: #f5e7c8;
    }
    
    /* ===== أزرار التحكم ===== */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    
    .control-btn {
      background: #2d3748;
      border: 1px solid #4a5568;
      color: white;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    .control-btn i {
      font-size: 1rem;
    }
    
    .control-btn:hover {
      background: #4a5568;
      border-color: #d4af37;
      transform: translateY(-2px);
    }
    
    .control-btn.back {
      background: #991b1b;
      border-color: #b91c1c;
    }
    
    .control-btn.back:hover {
      background: #b91c1c;
    }
    
    .control-btn.whatsapp {
      background: #075e54;
      border-color: #128c7e;
    }
    
    .control-btn.whatsapp:hover {
      background: #128c7e;
    }
    
    /* ===== مشغل الصوت الرئيسي ===== */
    .player-main {
      background: #1e293b;
      border-radius: 60px;
      padding: 20px 25px;
      margin-bottom: 30px;
      border: 1px solid #d4af37;
      box-shadow: 0 10px 25px -5px rgba(212, 175, 55, 0.2);
    }
    
    .now-playing {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }
    
    .playing-indicator {
      width: 14px;
      height: 14px;
      background: #4ade80;
      border-radius: 50%;
      display: none;
    }
    
    .playing-indicator.active {
      display: block;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .current-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #f5e7c8;
      flex: 1;
    }
    
    .loader {
      width: 20px;
      height: 20px;
      border: 2px solid #d4af37;
      border-bottom-color: transparent;
      border-radius: 50%;
      display: none;
      animation: rotation 1s linear infinite;
    }
    
    .loader.active {
      display: inline-block;
    }
    
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    audio {
      width: 100%;
      height: 50px;
      border-radius: 30px;
      outline: none;
    }
    
    audio::-webkit-media-controls-panel {
      background: #2d3748;
    }
    
    /* ===== شريط البحث والتصفية ===== */
    .search-section {
      margin: 25px 0 20px;
    }
    
    .search-box {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    
    .search-input {
      flex: 2;
      min-width: 250px;
      background: #1e293b;
      border: 1px solid #4a5568;
      border-radius: 50px;
      padding: 14px 22px;
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
    }
    
    .category-filter {
      flex: 1;
      min-width: 180px;
      background: #1e293b;
      border: 1px solid #4a5568;
      border-radius: 50px;
      padding: 14px 22px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    
    .category-filter option {
      background: #1e293b;
    }
    
    .stats {
      display: flex;
      justify-content: space-between;
      color: #a0aec0;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    
    /* ===== قائمة التسجيلات ===== */
    .recordings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      max-height: 600px;
      overflow-y: auto;
      padding: 10px 5px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .recordings-grid::-webkit-scrollbar {
      width: 8px;
    }
    
    .recordings-grid::-webkit-scrollbar-track {
      background: #1e293b;
      border-radius: 10px;
    }
    
    .recordings-grid::-webkit-scrollbar-thumb {
      background: #d4af37;
      border-radius: 10px;
    }
    
    .recording-card {
      background: #1e293b;
      border-radius: 20px;
      padding: 18px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid transparent;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    .recording-card:hover {
      transform: translateY(-4px);
      border-color: #d4af37;
      box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.3);
      background: #2d3748;
    }
    
    .recording-card.active {
      border-color: #d4af37;
      background: #2d3748;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .card-id {
      background: #d4af37;
      color: #0f172a;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.8rem;
    }
    
    .card-category {
      background: #4a5568;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #f5e7c8;
    }
    
    .card-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.5;
      color: #f5e7c8;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }
    
    .play-icon {
      color: #d4af37;
      font-size: 0.9rem;
    }
    
    .recording-card.active .play-icon {
      color: #4ade80;
    }
    
    /* ===== التذييل ===== */
    .footer {
      text-align: center;
      margin-top: 30px;
      color: #718096;
      font-size: 0.9rem;
    }
    
    .footer a {
      color: #d4af37;
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
    
    /* ===== للهواتف ===== */
    @media (max-width: 640px) {
      h1 { font-size: 1.8rem; }
      .container { padding: 15px; }
      .player-main { padding: 15px; }
      .current-title { font-size: 1rem; }
      .recordings-grid { grid-template-columns: 1fr; }
      .search-box { flex-direction: column; }
    }
  </style>
</head>

  <!-- ===== التذييل ===== -->

  </div>

    { id: '432', name: 'يوسف وق ميت طاهر 2002', url: 'https://archive.org/download/Sayed_Saiid_uP_bY_mUSLEm/432-2002_up_by_muslem.mp3', category: 'يوسف' }
  ];

  // ==================== عناصر الصفحة ====================
  const player = document.getElementById('audioPlayer');
  const currentSuraSpan = document.getElementById('currentSura');
  const playingIndicator = document.getElementById('playingIndicator');
  const bufferingLoader = document.getElementById('bufferingLoader');
  const recordingsGrid = document.getElementById('recordingsGrid');
  const searchInput = document.getElementById('searchInput');
  const categoryFilter = document.getElementById('categoryFilter');
  const visibleCountSpan = document.getElementById('visibleCount');
  const totalCountSpan = document.getElementById('totalCount');
  
  let currentActiveCard = null;
  let currentIndex = -1;

  // ==================== تجهيز خيارات التصنيفات ====================
  const categories = [...new Set(recordings.map(r => r.category))].sort();
  categories.forEach(cat => {
    const option = document.createElement('option');
    option.value = cat;
    option.textContent = `${cat} (${recordings.filter(r => r.category === cat).length})`;
    categoryFilter.appendChild(option);
  });

  // ==================== عرض التسجيلات ====================
  function displayRecordings(filteredRecordings) {
    recordingsGrid.innerHTML = '';
    
    if (filteredRecordings.length === 0) {
      recordingsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">❌ لا توجد تسجيلات تطابق البحث</div>';
      visibleCountSpan.textContent = '0';
      return;
    }
    
    filteredRecordings.forEach((rec, index) => {
      const card = document.createElement('div');
      card.className = 'recording-card';
      card.dataset.index = recordings.indexOf(rec); // الاحتفاظ بالفهرس الأصلي
      
      card.innerHTML = `
        <div class="card-header">
          <span class="card-id">${rec.id}</span>
          <span class="card-category">${rec.category}</span>
        </div>
        <div class="card-name">${rec.name}</div>
        <div class="card-footer">
          <span class="play-icon"><i class="fas fa-play"></i> استماع</span>
        </div>
      `;
      
      card.addEventListener('click', () => playRecording(rec, card));
      recordingsGrid.appendChild(card);
    });
    
    visibleCountSpan.textContent = filteredRecordings.length;
  }

  // ==================== تشغيل التسجيل ====================
  function playRecording(rec, cardElement) {
    // إزالة التفعيل من السابق
    if (currentActiveCard) {
      currentActiveCard.classList.remove('active');
    }
    
    // تفعيل البطاقة الجديدة
    cardElement.classList.add('active');
    currentActiveCard = cardElement;
    currentIndex = recordings.indexOf(rec);
    
    // تحديث المشغل
    player.src = rec.url;
    currentSuraSpan.textContent = `🎵 جاري التحميل: ${rec.name}`;
    bufferingLoader.classList.add('active');
    playingIndicator.classList.remove('active');
    
    player.play()
      .then(() => {
        currentSuraSpan.textContent = `🔊 الآن: ${rec.name}`;
        bufferingLoader.classList.remove('active');
        playingIndicator.classList.add('active');
      })
      .catch(error => {
        console.error('خطأ في التشغيل:', error);
        currentSuraSpan.textContent = `❌ خطأ في تشغيل ${rec.name}`;
        bufferingLoader.classList.remove('active');
      });
  }

  // ==================== التصفية والبحث ====================
  function filterRecordings() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    const selectedCategory = categoryFilter.value;
    
    const filtered = recordings.filter(rec => {
      const matchesSearch = searchTerm === '' || 
        rec.name.toLowerCase().includes(searchTerm) ||
        rec.category.toLowerCase().includes(searchTerm) ||
        rec.id.includes(searchTerm);
      
      const matchesCategory = selectedCategory === 'all' || rec.category === selectedCategory;
      
      return matchesSearch && matchesCategory;
    });
    
    displayRecordings(filtered);
  }

  // ==================== أحداث المشغل ====================
  player.addEventListener('pause', () => {
    playingIndicator.classList.remove('active');
  });

  player.addEventListener('play', () => {
    playingIndicator.classList.add('active');
  });

  player.addEventListener('ended', () => {
    playingIndicator.classList.remove('active');
    
    // تشغيل التالي إذا وجد
    if (currentIndex >= 0 && currentIndex < recordings.length - 1) {
      const nextIndex = currentIndex + 1;
      const nextRec = recordings[nextIndex];
      const cards = document.querySelectorAll('.recording-card');
      // البحث عن البطاقة المقابلة (قد تكون غير معروضة بسبب الفلتر)
      // سنستخدم البحث المباشر في القائمة الكاملة
      const nextCard = Array.from(cards).find(card => 
        parseInt(card.dataset.index) === nextIndex
      );
      
      if (nextCard) {
        playRecording(nextRec, nextCard);
      } else {
        // إذا كانت البطاقة غير معروضة، نلغي التفعيل
        if (currentActiveCard) {
          currentActiveCard.classList.remove('active');
          currentActiveCard = null;
        }
        currentSuraSpan.textContent = 'اختر تسجيلاً للاستماع';
      }
    } else {
      if (currentActiveCard) {
        currentActiveCard.classList.remove('active');
        currentActiveCard = null;
      }
      currentSuraSpan.textContent = 'اختر تسجيلاً للاستماع';
    }
  });

  player.addEventListener('waiting', () => {
    bufferingLoader.classList.add('active');
  });

  player.addEventListener('canplay', () => {
    bufferingLoader.classList.remove('active');
  });

  player.addEventListener('error', () => {
    bufferingLoader.classList.remove('active');
    playingIndicator.classList.remove('active');
    currentSuraSpan.textContent = '❌ فشل تحميل التسجيل';
  });

  // ==================== دوال إضافية ====================
  function goBack() {
    window.location.href = 'index.html'; // غير حسب اسم صفحتك الرئيسية
  }

  function reportBrokenLink() {
    const phoneNumber = '+201092116092'; // ضع الرقم المناسب
    const message = 'يوجد رابط معطل في مشغل تسجيلات الشيخ السيد سعيد، يرجى التحقق';
    const whatsappUrl = `https://wa.me/${phoneNumber.replace('+', '')}?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, '_blank');
  }

  // ==================== أحداث البحث ====================
  searchInput.addEventListener('input', filterRecordings);
  categoryFilter.addEventListener('change', filterRecordings);

  // ==================== العرض الأولي ====================
  displayRecordings(recordings);
  totalCountSpan.textContent = `${recordings.length} تسجيل`;

  // ==================== حفظ حالة التشغيل (اختياري) ====================
  // يمكن إضافة localStorage هنا إذا أردت
</script>

</body>
</html>
